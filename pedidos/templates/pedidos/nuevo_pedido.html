{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevo Pedido - Cocina</title>
<style>
  :root {
    --negro: #000;
    --blanco: #fff;
    --marron: #A36A2B;
    --beige: #F6E8D5;
    --violeta: #4B2E07;
    --verde: #28a745;
    --sombra: rgba(0, 0, 0, 0.15);
  }

  body {
    font-family: 'Poppins', 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, var(--beige), #fdfbf8);
    margin: 0;
    color: var(--violeta);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* === HEADER MEJORADO === */
  header {
    width: 100%;
    background-color: var(--marron);
    color: var(--blanco);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 10px;
    box-shadow: 0 6px 16px var(--sombra);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 2.4rem;
    margin: 0;
    text-align: center;
    flex-grow: 1;
  }
  header img {
      width: 80px;
      filter: brightness(0) invert(1);
      transition: transform 0.3s ease;
    }

    header img:hover {
      transform: scale(1.1);
    }

  .btn-volver {
    background-color: var(--violeta);
    color: var(--blanco);
    border: none;
    padding: 10px 20px;
    font-size: 1rem;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 10px var(--sombra);
  }

  .btn-volver:hover {
    background-color: var(--marron);
    transform: scale(1.05);
  }

  .logo-cheff {
    width: 60px;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 4px 10px var(--sombra);
  }

  /* === FORMULARIO === */
  form {
    width: 95%;
    max-width: 950px;
    background-color: var(--blanco);
    padding: 35px 25px;
    border-radius: 20px;
    margin: 40px 0 60px;
    box-shadow: 0 8px 25px var(--sombra);
  }

  label {
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
    font-size: 1rem;
  }

  input[type="text"], input[type="number"], select, textarea {
    width: 90%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--marron);
    font-size: 1rem;
    outline: none;
    margin-bottom: 15px;
    transition: 0.3s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--violeta);
    box-shadow: 0 0 5px rgba(75, 46, 7, 0.3);
  }

  .section-title {
    font-size: 1.4rem;
    color: var(--marron);
    font-weight: 700;
    margin: 25px 0 15px;
    border-bottom: 2px dashed var(--marron);
    padding-bottom: 5px;
  }

  #items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }

  .item {
    background-color: #fff8ef;
    border-radius: 18px;
    border-left: 6px solid var(--marron);
    padding: 22px;
    box-shadow: 0 4px 14px var(--sombra);
    transition: 0.3s;
  }

  .item:hover {
    transform: translateY(-3px);
  }

  .item h4 {
    margin: 0 0 12px;
    color: var(--violeta);
    font-size: 1.1rem;
  }

  .sabores-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .chip {
    background-color: var(--blanco);
    border: 1.5px solid var(--marron);
    border-radius: 25px;
    padding: 8px 15px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: 0.3s;
  }

  .chip:hover {
    background-color: var(--beige);
  }

  input[type="checkbox"].hidden {
    display: none;
  }

  input[type="checkbox"].hidden:checked + .chip {
    background-color: var(--marron);
    color: var(--blanco);
    transform: scale(1.05);
  }

  .switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 25px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #ccc;
    border-radius: 34px;
    transition: 0.3s;
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 2.5px;
    background-color: white;
    border-radius: 50%;
    transition: 0.3s;
  }

  input:checked + .slider {
    background-color: var(--marron);
  }

  input:checked + .slider:before {
    transform: translateX(24px);
  }

  button[type="button"], button[type="submit"] {
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button[type="button"] {
    background-color: var(--marron);
    color: var(--blanco);
    padding: 10px 18px;
    font-size: 1rem;
    margin-top: 12px;
  }

  button[type="button"]:hover {
    background-color: var(--violeta);
  }

  button[type="submit"] {
    width: 100%;
    background-color: var(--verde);
    color: var(--blanco);
    padding: 14px 0;
    font-size: 1.15rem;
    margin-top: 25px;
    box-shadow: 0 6px 16px var(--sombra);
  }

  button[type="submit"]:hover {
    transform: scale(1.03);
    background-color: #218838;
  }

  textarea {
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
    font-size: 1rem;
  }

  .bancario-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
  }

  .bancario-toggle span {
    font-weight: 500;
  }

  /* === FOOTER === */
  footer {
    text-align: center;
    padding: 25px;
    background: var(--violeta);
    color: var(--beige);
    font-size: 0.9rem;
    width: 100%;
    box-shadow: 0 -4px 12px var(--sombra);
  }

  footer img {
    width: 28px;
    vertical-align: middle;
    margin-right: 8px;
    border-radius: 6px;
  }

  /* === RESPONSIVO === */
  @media (max-width: 768px) {
    header h1 {
      font-size: 1.9rem;
    }
    .logo-cheff {
      width: 55px;
    }
    .btn-volver {
      font-size: 0.9rem;
      padding: 8px 14px;
    }
  }
</style>
</head>

<body>
  <header>
    <button class="btn-volver" onclick="window.location.href='/'">⬅️ Volver</button>
    <h1>🧾 Nuevo Pedido</h1>
    <img src="{% static 'img/cheff.png' %}" alt="Logo Amigo Cheff">
  </header>

  <form method="POST">
    {% csrf_token %}
    <label>Cliente:</label>
    <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position:relative;">
      <input type="text" id="cliente_input" name="cliente" placeholder="Buscar cliente..." autocomplete="off" style="flex:1; padding:10px; border-radius:8px; border:1.5px solid var(--marron);">
      <div id="cliente_suggestions" style="position:absolute; top:42px; left:0; right:140px; background:#fff; border:1px solid #ccc; max-height:150px; overflow-y:auto; z-index:100;"></div>
      <button type="button" id="btn_nuevo_cliente" style="
          background-color: var(--verde);
          color: var(--blanco);
          border: none;
          padding: 10px 16px;
          border-radius: 8px;
          cursor: pointer;
          font-weight: bold;
          transition: 0.3s;
        ">
        ➕ Nuevo
      </button>
    </div>

    <label>Tipo de entrega:</label>
    <select name="tipo_entrega">
      <option value="local">En el local</option>
      <option value="delivery">Delivery</option>
      <option value="retiro">Retiro</option>
    </select>
    <label>Condición de venta:</label>
    <select name="condicion_venta">
      <option value="contado">💵 Contado</option>
      <option value="credito">📄 Crédito</option>
    </select>

    <h3 class="section-title">🛒 Ítems del pedido</h3>
    <div id="items"></div>
    <input type="hidden" name="total_items" id="total_items" value="0">
    <button type="button" onclick="agregarItem()">➕ Agregar ítem</button>

    <label>¿Pago con tarjeta bancaria o transferencia?</label>
    <div class="bancario-toggle">
      <label class="switch">
        <input type="checkbox" name="ind_bancario" value="1">
        <span class="slider"></span>
      </label>
      <span>Activar pago bancario</span>
    </div>

    <label>Observación general:</label>
    <textarea name="observacion_general" rows="3" placeholder="Observaciones del pedido"></textarea>

    <button type="submit">✅ Guardar Pedido</button>
  </form>

  <footer>
    <img src="{% static 'img/moritech.png' %}" alt="Moritech">
    Desarrollado por Moritech © 2025
  </footer>

  <script>
  const input = document.getElementById('cliente_input');
const suggestions = document.getElementById('cliente_suggestions');

// Lista de clientes del servidor
const clientesData = [
  {% for c in clientes %}
    { id: {{ c.id }}, nombre: "{{ c.nombre }} {{ c.apellido }}", telefono: "{{ c.telefono }}" },
  {% endfor %}
];

// Filtrado y sugerencias
input.addEventListener('input', () => {
  const val = input.value.toLowerCase();
  suggestions.innerHTML = '';
  if (!val) return;
  const matches = clientesData.filter(c => c.nombre.toLowerCase().includes(val) || c.telefono.includes(val));
  matches.forEach(c => {
    const div = document.createElement('div');
    div.textContent = `${c.nombre} (${c.telefono})`;
    div.style.padding = '5px 10px';
    div.style.cursor = 'pointer';
    div.addEventListener('click', () => {
      input.value = c.id; // envía el ID al backend
      suggestions.innerHTML = '';
    });
    suggestions.appendChild(div);
  });
});

// Cerrar sugerencias si se hace click fuera
document.addEventListener('click', (e) => {
  if (!input.contains(e.target) && !suggestions.contains(e.target)) {
    suggestions.innerHTML = '';
  }
});
    let itemCount = 0;
    const productosPorCategoria = {
        'hamburguesa': [
        {% for p in productos %}
            {% if p.categoria == 'hamburguesa' %}
            {"id": {{ p.id }}, "nombre": "{{ p.nombre|escapejs }}", "precio": {{ p.precio|floatformat:0 }} },
            {% endif %}
        {% endfor %}
        ],
        'papas': [
        {% for p in productos %}
            {% if p.categoria == 'papas' %}
            {"id": {{ p.id }}, "nombre": "{{ p.nombre|escapejs }}", "precio": {{ p.precio|floatformat:0 }} },
            {% endif %}
        {% endfor %}
        ],
        'bebida': [
        {% for p in productos %}
            {% if p.categoria == 'bebida' %}
            {"id": {{ p.id }}, "nombre": "{{ p.nombre|escapejs }}", "precio": {{ p.precio|floatformat:0 }} },
            {% endif %}
        {% endfor %}
        ],
        'menu': [
        {% for p in productos %}
            {% if p.categoria == 'menu' %}
            {"id": {{ p.id }}, "nombre": "{{ p.nombre|escapejs }}", "precio": {{ p.precio|floatformat:0 }} },
            {% endif %}
        {% endfor %}
        ],
        'otro': [
        {% for p in productos %}
            {% if p.categoria == 'otro' %}
            {"id": {{ p.id }}, "nombre": "{{ p.nombre|escapejs }}", "precio": {{ p.precio|floatformat:0 }} },
            {% endif %}
        {% endfor %}
        ]
    };

    function agregarItem() {
      itemCount++;
      const cont = document.getElementById('items');
      const item = document.createElement('div');
      item.className = 'item';
      item.innerHTML = `
        <h4>🧾 Ítem ${itemCount}</h4>
        <label>Tipo:</label>
        <select name="tipo_item_${itemCount}" onchange="cambiarTipo(${itemCount}, this.value)">
          <option value="pizza">🍕 Pizza</option>
          <option value="hamburguesa">🍔 Hamburguesa</option>
          <option value="papas">🍟 Papas</option>
          <option value="bebida">🥤 Bebida</option>
          <option value="menu">🍽️ Menú</option>
          <option value="otro">🍽️ Otro</option>
        </select>

        <div id="pizza_${itemCount}" class="pizzaBox">
          <label>Tamaño:</label>
          <select name="tamano_${itemCount}">
            {% for t in tamanos %}
              <option value="{{ t.id }}">{{ t.nombre }} ({{ t.porciones }} porciones)</option>
            {% endfor %}
          </select>
          <label>Sabores:</label>
          <div class="sabores-container">
            {% for s in sabores %}
              <label>
                <input type="checkbox" name="sabores_${itemCount}" value="{{ s.id }}" class="hidden">
                <span class="chip">{{ s.nombre }}</span>
              </label>
            {% endfor %}
          </div>
          <div style="margin-top:10px;">
            <label>
              <input type="checkbox" name="borde_${itemCount}" value="1" class="hidden">
              <span class="chip">🍞 Con borde</span>
            </label>
          </div>
        </div>

        <div id="producto_${itemCount}" class="productoBox" style="display:none;">
          <label>Producto:</label>
          <select name="producto_${itemCount}" id="select_producto_${itemCount}">
            <option value="">Seleccione producto...</option>
          </select>
          <label>Cantidad:</label>
          <input type="number" name="cantidad_${itemCount}" value="1" min="1">
        </div>

        <label>Observación:</label>
        <textarea name="observacion_${itemCount}" rows="2"></textarea>
        <button type="button" onclick="eliminarItem(this)">❌ Quitar ítem</button>
      `;
      cont.appendChild(item);
      document.getElementById('total_items').value = itemCount;
    }

    function eliminarItem(btn) {
      btn.parentElement.remove();
    }

    function cambiarTipo(i, tipo) {
      const pizzaBox = document.getElementById(`pizza_${i}`);
      const productoBox = document.getElementById(`producto_${i}`);
      const selectProducto = document.getElementById(`select_producto_${i}`);
      if (tipo === 'pizza') {
        pizzaBox.style.display = 'block';
        productoBox.style.display = 'none';
      } else {
        pizzaBox.style.display = 'none';
        productoBox.style.display = 'block';
        selectProducto.innerHTML = '<option value="">Seleccione producto...</option>';
        if (productosPorCategoria[tipo]) {
          productosPorCategoria[tipo].forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = `${p.nombre} - ${p.precio} Gs.`;
            selectProducto.appendChild(opt);
          });
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
{% if pedido_guardado %}
<script>
Swal.fire({
  title: "¡Pedido guardado!",
  text: "El pedido se registró correctamente 🎉",
  icon: "success",
  confirmButtonColor: "#4B2E07",
  confirmButtonText: "Aceptar"
}).then(() => {
  window.location.href = "/";  // Redirección después de aceptar
});
</script>
{% endif %}
<script>
document.getElementById("btn_nuevo_cliente").addEventListener("click", async () => {
  const { value: formValues } = await Swal.fire({
    title: "Nuevo Cliente",
    html: `
      <input id="swal_nombre" class="swal2-input" placeholder="Nombre">
      <input id="swal_apellido" class="swal2-input" placeholder="Apellido">
      <input id="swal_telefono" class="swal2-input" placeholder="Teléfono">
    `,
    focusConfirm: false,
    showCancelButton: true,
    confirmButtonText: "Guardar",
    confirmButtonColor: "#4B2E07",
    cancelButtonText: "Cancelar",
    preConfirm: () => {
      const nombre = document.getElementById("swal_nombre").value.trim();
      const apellido = document.getElementById("swal_apellido").value.trim();
      const telefono = document.getElementById("swal_telefono").value.trim();
      if (!nombre || !apellido || !telefono) {
        Swal.showValidationMessage("⚠️ Todos los campos son obligatorios");
        return false;
      }
      return { nombre, apellido, telefono };
    }
  });

  if (formValues) {
    try {
      const response = await fetch("/clientes/nuevo_ajax/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify(formValues)
      });

      const data = await response.json();
      if (data.success) {
        Swal.fire({
          title: "Cliente agregado ✅",
          text: `${data.nombre} ${data.apellido} se agregó correctamente.`,
          icon: "success",
          confirmButtonColor: "#4B2E07"
        });
        // Agregar al array de clientes para autocompletar
        clientesData.push({id:data.id, nombre:`${data.nombre} ${data.apellido}`, telefono:data.telefono});
        // Seleccionar automáticamente
        input.value = data.id;
      } else {
        Swal.fire("Error", data.error || "No se pudo guardar el cliente", "error");
      }
    } catch (err) {
      Swal.fire("Error", "Error al conectar con el servidor", "error");
    }
  }
});
</script>
{% if error %}
<script>
Swal.fire({
  title: "Error al guardar",
  text: "{{ error|escapejs }}",
  icon: "error",
  confirmButtonColor: "#4B2E07",
  confirmButtonText: "Entendido"
});
</script>
{% endif %}
</body>
</html>
