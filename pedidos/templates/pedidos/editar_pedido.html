{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Pedido #{{ pedido.id }} - Cocina</title>
<style>
  :root {
    --negro: #000;
    --blanco: #fff;
    --marron: #A36A2B;
    --beige: #F6E8D5;
    --violeta: #4B2E07;
    --verde: #28a745;
    --sombra: rgba(0, 0, 0, 0.15);
  }

  body {
    font-family: 'Poppins', 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, var(--beige), #fdfbf8);
    margin: 0;
    color: var(--violeta);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* === HEADER MEJORADO === */
  header {
    width: 100%;
    background-color: var(--marron);
    color: var(--blanco);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 10px;
    box-shadow: 0 6px 16px var(--sombra);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 2.4rem;
    margin: 0;
    text-align: center;
    flex-grow: 1;
  }
  header img {
      width: 80px;
      filter: brightness(0) invert(1);
      transition: transform 0.3s ease;
    }

    header img:hover {
      transform: scale(1.1);
    }

  .btn-volver {
    background-color: var(--violeta);
    color: var(--blanco);
    border: none;
    padding: 10px 20px;
    font-size: 1rem;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 10px var(--sombra);
  }

  .btn-volver:hover {
    background-color: var(--marron);
    transform: scale(1.05);
  }

  .logo-cheff {
    width: 60px;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 4px 10px var(--sombra);
  }

  /* === FORMULARIO === */
  form {
    width: 95%;
    max-width: 950px;
    background-color: var(--blanco);
    padding: 35px 25px;
    border-radius: 20px;
    margin: 40px 0 60px;
    box-shadow: 0 8px 25px var(--sombra);
  }

  label {
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
    font-size: 1rem;
  }

  input[type="text"], input[type="number"], select, textarea {
    width: 90%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--marron);
    font-size: 1rem;
    outline: none;
    margin-bottom: 15px;
    transition: 0.3s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--violeta);
    box-shadow: 0 0 5px rgba(75, 46, 7, 0.3);
  }

  .section-title {
    font-size: 1.4rem;
    color: var(--marron);
    font-weight: 700;
    margin: 25px 0 15px;
    border-bottom: 2px dashed var(--marron);
    padding-bottom: 5px;
  }

  #items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }

  .item {
    background-color: #fff8ef;
    border-radius: 18px;
    border-left: 6px solid var(--marron);
    padding: 22px;
    box-shadow: 0 4px 14px var(--sombra);
    transition: 0.3s;
  }

  .item:hover {
    transform: translateY(-3px);
  }

  .item h4 {
    margin: 0 0 12px;
    color: var(--violeta);
    font-size: 1.1rem;
  }

  .sabores-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .chip {
    background-color: var(--blanco);
    border: 1.5px solid var(--marron);
    border-radius: 25px;
    padding: 8px 15px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: 0.3s;
  }

  .chip:hover {
    background-color: var(--beige);
  }

  input[type="checkbox"].hidden {
    display: none;
  }

  input[type="checkbox"].hidden:checked + .chip {
    background-color: var(--marron);
    color: var(--blanco);
    transform: scale(1.05);
  }

  .switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 25px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #ccc;
    border-radius: 34px;
    transition: 0.3s;
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 2.5px;
    background-color: white;
    border-radius: 50%;
    transition: 0.3s;
  }

  input:checked + .slider {
    background-color: var(--marron);
  }

  input:checked + .slider:before {
    transform: translateX(24px);
  }

  button[type="button"], button[type="submit"] {
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button[type="button"] {
    background-color: var(--marron);
    color: var(--blanco);
    padding: 10px 18px;
    font-size: 1rem;
    margin-top: 12px;
  }

  button[type="button"]:hover {
    background-color: var(--violeta);
  }

  button[type="submit"] {
    width: 100%;
    background-color: var(--verde);
    color: var(--blanco);
    padding: 14px 0;
    font-size: 1.15rem;
    margin-top: 25px;
    box-shadow: 0 6px 16px var(--sombra);
  }

  button[type="submit"]:hover {
    transform: scale(1.03);
    background-color: #218838;
  }

  textarea {
    /* ... ya tienes estos estilos ... */
  }

  .bancario-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
  }

  .bancario-toggle span {
    font-weight: 500;
  }

  /* === FOOTER === */
  footer {
    text-align: center;
    padding: 25px;
    background: var(--violeta);
    color: var(--beige);
    font-size: 0.9rem;
    width: 100%;
    box-shadow: 0 -4px 12px var(--sombra);
  }

  footer img {
    width: 28px;
    vertical-align: middle;
    margin-right: 8px;
    border-radius: 6px;
  }

  /* === RESPONSIVO === */
  @media (max-width: 768px) {
    header h1 {
      font-size: 1.9rem;
    }
    .logo-cheff {
      width: 55px;
    }
    .btn-volver {
      font-size: 0.9rem;
      padding: 8px 14px;
    }
  }
</style>
</head>

<body onload="cargarDetallesExistentes()">
  <header>
    <button class="btn-volver" onclick="window.location.href='/'">⬅️ Volver</button>
    <h1>📝 Editar Pedido #{{ pedido.id }}</h1>
    <img src="{% static 'img/cheff.png' %}" alt="Logo Amigo Cheff">
  </header>

  <form method="POST">
    {% csrf_token %}
    <input type="hidden" name="pedido_id" value="{{ pedido.id }}">
    
    <label>Cliente:</label>
    <select name="cliente">
      <option value="">-- Seleccione Cliente --</option>
      {% for cliente in clientes %}
        <option value="{{ cliente.id }}" {% if pedido.cliente.id == cliente.id %}selected{% endif %}>
          {{ cliente.nombre }} {{ cliente.apellido }} ({{ cliente.telefono }})
        </option>
      {% endfor %}
    </select>

    <label>Tipo de entrega:</label>
    <select name="tipo_entrega">
      <option value="local" {% if pedido.tipo_entrega == 'local' %}selected{% endif %}>En el local</option>
      <option value="delivery" {% if pedido.tipo_entrega == 'delivery' %}selected{% endif %}>Delivery</option>
      <option value="retiro" {% if pedido.tipo_entrega == 'retiro' %}selected{% endif %}>Retiro</option>
    </select>

    <h3 class="section-title">🛒 Ítems del pedido (Total: {{ pedido.total|floatformat:0 }} Gs.)</h3>
    <div id="items">
      </div>
    <input type="hidden" name="total_items" id="total_items" value="0">
    <button type="button" onclick="agregarItem()">➕ Agregar ítem</button>

    <label>¿Pago con tarjeta bancaria o transferencia?</label>
    <div class="bancario-toggle">
      <label class="switch">
        <input type="checkbox" name="ind_bancario" value="1" {% if pedido.ind_bancario %}checked{% endif %}>
        <span class="slider"></span>
      </label>
      <span>Activar pago bancario</span>
    </div>

    <label>Observación general:</label>
    <textarea name="observacion_general" rows="3" placeholder="Observaciones del pedido">{{ pedido.observacion_general|default_if_none:"" }}</textarea>

    <button type="submit">💾 Actualizar Pedido</button>
  </form>

  <footer>
    <img src="{% static 'img/moritech.png' %}" alt="Moritech">
    Desarrollado por Moritech © 2025
  </footer>

  <script>
    let itemCount = 0;
    // Datos de productos (igual que en nuevo_pedido.html)
    const productosPorCategoria = {
      'hamburguesa': [
      {% for p in productos %}
        {% if p.categoria == 'hamburguesa' %}
        {"id": {{ p.id }}, "nombre": "{{ p.nombre|escapejs }}", "precio": {{ p.precio|floatformat:0 }} },
        {% endif %}
      {% endfor %}
      ],
      'papas': [
      {% for p in productos %}
        {% if p.categoria == 'papas' %}
        {"id": {{ p.id }}, "nombre": "{{ p.nombre|escapejs }}", "precio": {{ p.precio|floatformat:0 }} },
        {% endif %}
      {% endfor %}
      ],
      'bebida': [
      {% for p in productos %}
        {% if p.categoria == 'bebida' %}
        {"id": {{ p.id }}, "nombre": "{{ p.nombre|escapejs }}", "precio": {{ p.precio|floatformat:0 }} },
        {% endif %}
      {% endfor %}
      ],
      'otro': [
      {% for p in productos %}
        {% if p.categoria == 'otro' %}
        {"id": {{ p.id }}, "nombre": "{{ p.nombre|escapejs }}", "precio": {{ p.precio|floatformat:0 }} },
        {% endif %}
      {% endfor %}
      ]
    };
    
    // Lista de detalles existentes inyectada desde la vista
    const detallesExistentes = JSON.parse('{{ detalles_json|escapejs }}');

    // Función para crear un nuevo ítem (igual que antes, con la adición de `detalle_id`)
    function crearItemHtml(index, detalle) {
      const isPizza = detalle && detalle.tipo === 'pizza';
      const isProducto = detalle && detalle.tipo !== 'pizza';
      const tipoDefault = detalle ? detalle.tipo : 'pizza';
      
      let html = `
        <h4>🧾 Ítem ${index}</h4>
        <input type="hidden" name="detalle_id_${index}" value="${detalle ? detalle.id : ''}">
        <label>Tipo:</label>
        <select name="tipo_item_${index}" onchange="cambiarTipo(${index}, this.value)">
          <option value="pizza" ${tipoDefault === 'pizza' ? 'selected' : ''}>🍕 Pizza</option>
          <option value="hamburguesa" ${tipoDefault === 'hamburguesa' ? 'selected' : ''}>🍔 Hamburguesa</option>
          <option value="papas" ${tipoDefault === 'papas' ? 'selected' : ''}>🍟 Papas</option>
          <option value="bebida" ${tipoDefault === 'bebida' ? 'selected' : ''}>🥤 Bebida</option>
          <option value="otro" ${tipoDefault === 'otro' ? 'selected' : ''}>🍽️ Otro</option>
        </select>

        <div id="pizza_${index}" class="pizzaBox" style="display:${isProducto ? 'none' : 'block'};">
          <label>Tamaño:</label>
          <select name="tamano_${index}">
            {% for t in tamanos %}
              <option value="{{ t.id }}" ${isPizza && detalle.tamano_id === {{ t.id }} ? 'selected' : ''}>
                {{ t.nombre }} ({{ t.porciones }} porciones)
              </option>
            {% endfor %}
          </select>
          <label>Sabores:</label>
          <div class="sabores-container">
            {% for s in sabores %}
              <label>
                <input type="checkbox" name="sabores_${index}" value="{{ s.id }}" class="hidden" 
                  ${isPizza && detalle.sabores_ids && detalle.sabores_ids.includes({{ s.id }}) ? 'checked' : ''}>
                <span class="chip">{{ s.nombre }}</span>
              </label>
            {% endfor %}
          </div>
          <div style="margin-top:10px;">
            <label>
              <input type="checkbox" name="borde_${index}" value="1" class="hidden" ${isPizza && detalle.con_borde ? 'checked' : ''}>
              <span class="chip">🍞 Con borde</span>
            </label>
          </div>
        </div>

        <div id="producto_${index}" class="productoBox" style="display:${isProducto ? 'block' : 'none'};">
          <label>Producto:</label>
          <select name="producto_${index}" id="select_producto_${index}">
            <option value="">Seleccione producto...</option>
          </select>
          <label>Cantidad:</label>
          <input type="number" name="cantidad_${index}" value="${isProducto ? detalle.cantidad : 1}" min="1">
        </div>

        <label>Observación:</label>
        <textarea name="observacion_${index}" rows="2">${detalle ? detalle.observacion : ''}</textarea>
        <button type="button" onclick="eliminarItem(this)">❌ Quitar ítem</button>
      `;
      return html;
    }

    // Función para agregar un nuevo ítem (se reutiliza el HTML base)
    function agregarItem(detalle = null) {
      itemCount++;
      const cont = document.getElementById('items');
      const item = document.createElement('div');
      item.className = 'item';
      item.innerHTML = crearItemHtml(itemCount, detalle);
      cont.appendChild(item);
      document.getElementById('total_items').value = itemCount;

      // Si es un producto existente, es necesario llamar a cambiarTipo para poblar el select de productos
      if (detalle && detalle.tipo !== 'pizza') {
        cambiarTipo(itemCount, detalle.tipo, detalle.producto_id);
      }
    }

    // Función para precargar los ítems al cargar la página
    function cargarDetallesExistentes() {
      detallesExistentes.forEach(detalle => {
        agregarItem(detalle);
      });
      // Si no hay detalles, agregamos uno vacío para empezar
      if (detallesExistentes.length === 0) {
          agregarItem();
      }
    }

    // Función para eliminar un ítem (igual que antes)
    function eliminarItem(btn) {
      btn.parentElement.remove();
    }

    // Función para cambiar el tipo de ítem (igual que antes, con parámetro opcional para precargar)
    function cambiarTipo(i, tipo, productoIdSeleccionado = null) {
      const pizzaBox = document.getElementById(`pizza_${i}`);
      const productoBox = document.getElementById(`producto_${i}`);
      const selectProducto = document.getElementById(`select_producto_${i}`);

      if (tipo === 'pizza') {
        pizzaBox.style.display = 'block';
        productoBox.style.display = 'none';
      } else {
        pizzaBox.style.display = 'none';
        productoBox.style.display = 'block';
        selectProducto.innerHTML = '<option value="">Seleccione producto...</option>';
        if (productosPorCategoria[tipo]) {
          productosPorCategoria[tipo].forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = `${p.nombre} - ${p.precio} Gs.`;
            if (productoIdSeleccionado && p.id === productoIdSeleccionado) {
              opt.selected = true;
            }
            selectProducto.appendChild(opt);
          });
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  {% if pedido_actualizado %}
  <script>
  Swal.fire({
    title: "¡Pedido actualizado!",
    text: "El pedido #{{ pedido.id }} se guardó correctamente ✅",
    icon: "success",
    confirmButtonColor: "#4B2E07",
    confirmButtonText: "Aceptar"
  }).then(() => {
    // Redireccionar al home o a la vista de detalles del pedido
    window.location.href = "/";
  });
  </script>
  {% endif %}
</body>
</html>
