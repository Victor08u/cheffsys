<!-- Caja actual con saldo efectivo y bancario -->
{% load static %}
{% load humanize %}

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Balance Diario</title>

  <style>
    /* --- MISMO DISEÑO QUE EL BALANCE MENSUAL --- */

    :root {
      --negro: #000;
      --blanco: #fff;
      --marron: #A36A2B;
      --beige: #E2C9A5;
      --violeta: #4B2E07;
      --verde: #2e7d32;
      --rojo: #c62828;
      --gris-claro: #f9f6f2;
      --sombra: rgba(0, 0, 0, 0.15);
    }

    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, var(--beige), #f7e7d3);
      color: var(--violeta);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background-color: var(--marron);
      color: var(--blanco);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 40px;
      box-shadow: 0 6px 14px var(--sombra);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      flex: 1;
      text-align: center;
      font-size: 3.2rem;
      letter-spacing: 1px;
      margin: 0;
      text-transform: uppercase;
    }

    .btn-volver {
      background-color: var(--violeta);
      color: var(--blanco);
      border: none;
      padding: 14px 26px;
      font-size: 1.6rem;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-volver:hover {
      background-color: var(--marron);
      transform: scale(1.05);
    }

    .filtro-container {
      margin-top: 30px;
      background-color: var(--blanco);
      padding: 20px 30px;
      border-radius: 18px;
      box-shadow: 0 6px 15px var(--sombra);
      display: flex;
      gap: 15px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .filtro-container label {
      font-weight: 600;
      font-size: 1.2rem;
    }

    .filtro-container input {
      padding: 10px 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 1.1rem;
    }

    .filtro-container button {
      background-color: var(--violeta);
      color: var(--blanco);
      border: none;
      padding: 10px 20px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .resumen {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 25px;
      width: 90%;
      max-width: 1000px;
      margin-top: 40px;
    }

    .card {
      background-color: var(--blanco);
      border-radius: 18px;
      padding: 25px 20px;
      box-shadow: 0 6px 15px var(--sombra);
      text-align: center;
    }

    .card h3 {
      color: var(--marron);
      margin-bottom: 10px;
    }

    .card p {
      font-size: 1.6rem;
      font-weight: bold;
    }

    .verde { color: var(--verde); }
    .rojo { color: var(--rojo); }

    .detalles {
      width: 90%;
      max-width: 1100px;
      margin-top: 50px;
      margin-bottom: 60px;
    }

    .detalles h2 {
      border-bottom: 2px dashed var(--marron);
      padding-bottom: 5px;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      box-shadow: 0 5px 15px var(--sombra);
      border-radius: 15px;
      overflow: hidden;
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
    }

    th {
      background-color: var(--marron);
      color: var(--blanco);
      text-transform: uppercase;
    }

    tr:nth-child(even) {
      background-color: var(--gris-claro);
    }
  </style>
</head>

<body>

<header>
    <button class="btn-volver" onclick="window.location.href='/'">⬅ Volver</button>
    <h1>📅 Caja Actual</h1>
</header>
<section class="resumen">
    <div class="card">
        <h3>Caja Actual</h3>
        <p class="verde">Gs. {{ caja_actual|floatformat:0|intcomma }}</p>
    </div>
    <div class="card">
        <h3>Saldo Efectivo</h3>
        <p class="verde">Gs. {{ saldo_efectivo|floatformat:0|intcomma }}</p>
    </div>
    <div class="card">
        <h3>Saldo Bancario</h3>
        <p class="verde">Gs. {{ saldo_bancario|floatformat:0|intcomma }}</p>
    </div>
</section>
</body>
</html>
