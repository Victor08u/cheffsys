{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevo Sabor - Amigo Cheff</title>
<style>
  :root {
    --marron: #A36A2B;
    --violeta: #4B2E07;
    --beige: #F6E8D5;
    --blanco: #fff;
    --verde: #28a745;
    --sombra: rgba(0,0,0,0.15);
    --radius: 16px;
    --transicion: 0.3s;
  }

  body {
        font-family: 'Poppins', 'Segoe UI', sans-serif;
        background: linear-gradient(160deg, var(--beige), #fdfbf8);
        margin: 0;
        color: var(--violeta);
        display: flex;
        flex-direction: column;
        min-height: 100vh; /* altura mínima 100% de la ventana */
    }

    /* Contenedor principal para empujar el footer */
    main {
        flex: 1; /* ocupa todo el espacio disponible */
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

 /* HEADER */
    header {
      width: 100%;
      background-color: var(--marron);
      color: var(--blanco);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 10px;
      box-shadow: 0 6px 14px var(--sombra-suave);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      flex: 1;
      text-align: center;
      font-size: 3.2rem;
      letter-spacing: 1px;
      margin: 0;
      text-transform: uppercase;
    }

    header img {
      width: 80px;
      filter: brightness(0) invert(1);
      transition: transform 0.3s ease;
    }

    header img:hover {
      transform: scale(1.1);
    }

    

    .btn-volver {
      background-color: var(--violeta);
      color: var(--blanco);
      border: none;
      padding: 14px 26px;
      font-size: 1.6rem;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 12px var(--sombra-suave);
    }

    .btn-volver:hover {
      background-color: var(--marron);
      transform: scale(1.05);
    }

  /* === FORMULARIO === */
  form {
    width: 95%;
    max-width: 600px;
    background-color: var(--blanco);
    padding: 35px 25px;
    border-radius: var(--radius);
    margin: 40px 0 60px;
    box-shadow: 0 8px 25px var(--sombra);
  }
  label {
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
    font-size: 1rem;
  }
  input, textarea {
    width: 90%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--marron);
    font-size: 1rem;
    outline: none;
    margin-bottom: 15px;
    transition: var(--transicion);
  }
  input:focus, textarea:focus {
    border-color: var(--violeta);
    box-shadow: 0 0 5px rgba(75,46,7,0.3);
  }

  /* === BOTONES === */
  button[type="submit"] {
    width: 100%;
    background-color: var(--verde);
    color: var(--blanco);
    padding: 14px 0;
    font-size: 1.15rem;
    margin-top: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 6px 16px var(--sombra);
    font-weight: bold;
    transition: 0.3s;
  }
  button[type="submit"]:hover {
    background-color: #218838;
    transform: scale(1.03);
  }

  .btn-secondary {
    display: block;
    width: 100%;
    text-align: center;
    margin-top: 12px;
    padding: 10px 0;
    background-color: var(--marron);
    color: var(--blanco);
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    transition: 0.3s;
  }
  .btn-secondary:hover {
    background-color: var(--violeta);
  }

  /* === FOOTER === */
  footer {
    text-align: center;
    padding: 25px;
    background: var(--violeta);
    color: var(--beige);
    font-size: 0.9rem;
    width: 100%;
    box-shadow: 0 -4px 12px var(--sombra);
  }
  footer img {
    width: 28px;
    vertical-align: middle;
    margin-right: 8px;
    border-radius: 6px;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header {
        padding: auto;
    }
    header img {
        padding: 20px;
    }
    header h1 {
        font-size: 1.6rem;
    }
    .btn-volver { font-size: 0.8rem; padding: auto; }

  }
</style>
</head>
<body>

 <header>
  <button class="btn-volver" onclick="window.location.href='{% url 'inicio' %}'">⬅️ Volver</button>
  <h1>Nuevo Sabor</h1>
  <img src="{% static 'img/cheff.png' %}" alt="Logo Amigo Cheff">
 </header>
 <main>
    <form method="POST">
    {% csrf_token %}
    <label for="nombre">Nombre del Sabor:</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="descripcion">Descripción:</label>
    <textarea id="descripcion" name="descripcion" rows="3"></textarea>

    <button type="submit">💾 Guardar Sabor</button>
    <a href="{% url 'inicio' %}" class="btn-secondary">↩ Volver</a>
    </form>
</main>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  {% if sabores_guardado %}
  <script>
  Swal.fire({
    title: "Sabor guardado!",
    text: "El sabor se registró correctamente 🎉",
    icon: "success",
    confirmButtonColor: "#4B2E07",
    confirmButtonText: "Aceptar"
  }).then(() => {
    window.location.href = "/";  // Redirección después de aceptar
  });
  </script>
  {% endif %}
 <footer>
  <img src="{% static 'img/moritech.png' %}" alt="Moritech">
  Desarrollado por Moritech © 2025
 </footer>

</body>
</html>
